<!doctype html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UyDosh — E’lonlar</title>
    <meta name="description" content="UyDosh ijara e’lonlari — Toshkent bo‘ylab xonadoshlar va kvartiralar." />
    <meta property="og:title" content="UyDosh — E’lonlar" />
    <meta property="og:description" content="Ijara e’lonlari va xonadoshlar." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="images/uydosh-logo.svg" />
    <link rel="icon" href="images/uydosh-logo.svg" type="image/svg+xml" />

    <style>
      :root {
        color-scheme: light dark;
        --blue: #00426e;
        --bg: #061525;
        --fg: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.7);
        --card: rgba(255, 255, 255, 0.06);
        --stroke: rgba(255, 255, 255, 0.12);
        --brand: #e11d2e;
        --brand2: #60a5fa;
        --accent: #22c55e;
        --shadow: 0 18px 70px rgba(0, 0, 0, 0.45);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --fg: rgba(15, 23, 42, 0.92);
          --muted: rgba(15, 23, 42, 0.7);
          --card: rgba(15, 23, 42, 0.04);
          --stroke: rgba(15, 23, 42, 0.12);
          --shadow: 0 18px 70px rgba(2, 6, 23, 0.14);
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background:
          radial-gradient(1200px 500px at 15% 0%, rgba(0, 66, 110, 0.36), transparent 58%),
          radial-gradient(900px 600px at 85% 10%, rgba(96, 165, 250, 0.22), transparent 62%),
          radial-gradient(800px 620px at 92% 82%, rgba(225, 29, 46, 0.12), transparent 62%),
          var(--bg);
        color: var(--fg);
        min-height: 100vh;
      }
      a { color: inherit; text-decoration: none; }
      a:hover { text-decoration: underline; }

      .wrap { max-width: 1100px; margin: 0 auto; padding: 20px 16px 80px; }
      header {
        display: flex; flex-wrap: wrap; align-items: center;
        justify-content: space-between; gap: 16px 20px; padding: 10px 0 18px;
      }
      .brand { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 0 1 auto; }
      .brand img { width: 60px; height: 60px; display: block; border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25); background: rgba(255, 255, 255, 0.04); }
      .brand strong { font-size: 16px; letter-spacing: 0.2px; }
      nav { display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        justify-content: flex-end; min-width: 0; flex: 1 1 auto; max-width: 100%; }
      .lang { display: inline-flex; flex-wrap: wrap; gap: 6px; padding: 6px;
        border-radius: 999px; border: 1px solid var(--stroke); background: rgba(255, 255, 255, 0.02); }
      .lang button { appearance: none; border: 0; background: transparent; color: var(--muted);
        font-weight: 700; font-size: 12px; letter-spacing: 0.08em; padding: 7px 10px;
        border-radius: 999px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
      .lang button[aria-pressed="true"] { color: var(--fg); background: rgba(255, 255, 255, 0.08); }
      .lang button:hover { color: var(--fg); background: rgba(255, 255, 255, 0.06); }
      .pill { display: inline-flex; align-items: center; justify-content: center;
        padding: 8px 12px; border: 1px solid var(--stroke); background: rgba(255, 255, 255, 0.02);
        border-radius: 999px; font-size: 14px; color: var(--muted); white-space: nowrap; }
      .pill:hover { background: rgba(255, 255, 255, 0.06); text-decoration: none; color: var(--fg); }
      .pill.active { color: var(--fg); background: rgba(255, 255, 255, 0.08); }

      .hero {
        display: flex; flex-direction: column; gap: 8px;
        padding: 14px 0 22px;
      }
      .hero h1 { font-size: clamp(26px, 3.2vw, 36px); margin: 0; letter-spacing: -0.02em; }
      .hero p { margin: 0; color: var(--muted); font-size: 16px; max-width: 60ch; }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
      }

      .card {
        position: relative;
        border: 1px solid var(--stroke);
        background: var(--card);
        border-radius: 18px;
        overflow: hidden;
        display: flex; flex-direction: column;
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      }
      .card:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.08);
        text-decoration: none;
      }
      .card .thumb {
        aspect-ratio: 4 / 3;
        width: 100%;
        background: linear-gradient(135deg, rgba(96, 165, 250, 0.12), rgba(225, 29, 46, 0.08));
        position: relative;
        overflow: hidden;
      }
      .card .thumb img {
        width: 100%; height: 100%; object-fit: cover; display: block;
      }
      .card .thumb.empty::after {
        content: "UyDosh"; position: absolute; inset: 0;
        display: grid; place-items: center; color: var(--muted); font-weight: 700; letter-spacing: 0.12em;
      }
      .featured-badge {
        position: absolute; top: 10px; left: 10px;
        background: linear-gradient(135deg, #e11d2e, #f97316);
        color: white; font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
        padding: 5px 9px; border-radius: 999px; text-transform: uppercase;
        box-shadow: 0 8px 24px rgba(225, 29, 46, 0.35);
      }
      .type-badge {
        position: absolute; top: 10px; right: 10px;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(6px);
        color: #fff; font-size: 11px; font-weight: 600;
        padding: 5px 9px; border-radius: 999px;
      }
      .card .body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 6px; }
      .card .title { font-size: 15px; font-weight: 700; line-height: 1.3;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .card .price { font-size: 18px; font-weight: 800; letter-spacing: -0.01em; }
      .card .price small { font-weight: 500; font-size: 13px; color: var(--muted); margin-left: 2px; }
      .card .meta { color: var(--muted); font-size: 13px; line-height: 1.45;
        display: flex; flex-wrap: wrap; gap: 6px 10px; }
      .card .meta span { display: inline-flex; align-items: center; gap: 4px; }
      .card .meta .dotsep::before { content: "•"; margin-right: 6px; opacity: 0.6; }

      .skeleton {
        border: 1px solid var(--stroke); background: var(--card); border-radius: 18px; overflow: hidden;
      }
      .skeleton .thumb, .skeleton .line {
        background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.12), rgba(255,255,255,0.04));
        background-size: 200% 100%;
        animation: shimmer 1.2s linear infinite;
      }
      @media (prefers-color-scheme: light) {
        .skeleton .thumb, .skeleton .line {
          background: linear-gradient(90deg, rgba(15,23,42,0.05), rgba(15,23,42,0.12), rgba(15,23,42,0.05));
          background-size: 200% 100%;
        }
      }
      .skeleton .thumb { aspect-ratio: 4/3; }
      .skeleton .body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 8px; }
      .skeleton .line { height: 10px; border-radius: 6px; }
      .skeleton .line.w60 { width: 60%; }
      .skeleton .line.w40 { width: 40%; }
      .skeleton .line.w80 { width: 80%; }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      .status {
        margin: 24px 0; text-align: center; color: var(--muted); font-size: 14px;
        min-height: 24px;
      }
      .status .btn {
        margin-top: 12px;
        display: inline-flex; align-items: center; justify-content: center;
        padding: 9px 14px; border-radius: 12px; border: 1px solid var(--stroke);
        background: rgba(255, 255, 255, 0.04); color: var(--fg); font-weight: 600;
        font-size: 14px; cursor: pointer;
      }
      .status .btn:hover { background: rgba(255, 255, 255, 0.08); }

      footer {
        margin-top: 40px;
        color: var(--muted); font-size: 14px;
        display: flex; gap: 12px; flex-wrap: wrap;
        justify-content: space-between; align-items: center;
      }
      .links { display: flex; gap: 14px; flex-wrap: wrap; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a class="brand" href="index.html">
          <img src="images/uydosh-logo.svg" alt="UyDosh logo" />
          <div>
            <strong>UyDosh</strong><br />
            <span style="color: var(--muted); font-size: 14px" data-i18n="brand.tagline">Ijara & xonadoshlar</span>
          </div>
        </a>
        <nav>
          <div class="lang" role="group" aria-label="Language">
            <button type="button" data-lang="uz" aria-pressed="true"><span class="flag" aria-hidden="true">🇺🇿</span> UZ</button>
            <button type="button" data-lang="ru" aria-pressed="false"><span class="flag" aria-hidden="true">🇷🇺</span> RU</button>
            <button type="button" data-lang="en" aria-pressed="false"><span class="flag" aria-hidden="true">🇬🇧</span> EN</button>
          </div>
          <a class="pill" href="index.html" data-i18n="nav.home">Asosiy</a>
          <a class="pill active" href="listings.html" data-i18n="nav.listings">E’lonlar</a>
        </nav>
      </header>

      <section class="hero">
        <h1 data-i18n="feed.title">Yangi e’lonlar</h1>
        <p data-i18n="feed.subtitle">Haqiqiy uy-joy va xonadoshlar — eng yangisi yuqorida.</p>
      </section>

      <main>
        <div class="grid" id="grid" aria-live="polite"></div>
        <div class="status" id="status" role="status"></div>
        <div id="sentinel" aria-hidden="true" style="height: 1px;"></div>
      </main>

      <footer>
        <div>© <span id="y"></span> UyDosh</div>
        <div class="links">
          <a href="index.html" data-i18n="nav.home">Asosiy</a>
          <a href="privacy-policy.html" data-i18n="nav.privacy">Maxfiylik</a>
          <a href="mailto:uydoshtech@gmail.com" data-i18n="nav.contact">Aloqa</a>
        </div>
      </footer>
    </div>

    <script src="assets/uydosh-web.js"></script>
    <script>
      document.getElementById('y').textContent = new Date().getFullYear();

      // Keep the web landing page fast: show only the top 10 newest listings.
      const PAGE_SIZE = 10;
      const gridEl = document.getElementById('grid');
      const statusEl = document.getElementById('status');
      const sentinelEl = document.getElementById('sentinel');

      const state = {
        page: 0,
        // We intentionally load only a single page on the website.
        totalPages: 1,
        loading: false,
        errored: false,
        reachedEnd: false,
        items: [], // kept for re-rendering on language switch
      };

      function listingCardHtml(listing) {
        const lang = UyDosh.getLang();
        const photo = UyDosh.primaryPhoto(listing);
        const photoSrc = photo ? UyDosh.photoUrl(photo) : '';
        const title = UyDosh.escapeHtml(listing.title || '');
        const price = UyDosh.formatPrice(listing, lang);
        const typeName = UyDosh.localized(listing.listing_type, lang);
        const locName = UyDosh.localizedShort(listing.location, lang);
        const metro = UyDosh.localized(listing.subway_station, lang);
        const rooms = Number(listing.rooms_number);
        const metaParts = [];
        if (locName) metaParts.push(`<span>${UyDosh.escapeHtml(locName)}</span>`);
        if (metro) metaParts.push(`<span class="dotsep">🚇 ${UyDosh.escapeHtml(metro)}</span>`);
        if (Number.isFinite(rooms) && rooms > 0) {
          metaParts.push(`<span class="dotsep">${rooms} ${UyDosh.escapeHtml(UyDosh.t('card.rooms'))}</span>`);
        }
        if (listing.private_room) {
          metaParts.push(`<span class="dotsep">${UyDosh.escapeHtml(UyDosh.t('card.privateRoom'))}</span>`);
        }

        const featured = UyDosh.isFeatured(listing)
          ? `<div class="featured-badge">${UyDosh.escapeHtml(UyDosh.t('card.featured'))}</div>`
          : '';
        const typeBadge = typeName
          ? `<div class="type-badge">${UyDosh.escapeHtml(typeName)}</div>`
          : '';
        const thumb = photoSrc
          ? `<div class="thumb"><img loading="lazy" decoding="async" src="${UyDosh.escapeHtml(photoSrc)}" alt="${UyDosh.escapeHtml(title)}" onerror="this.parentElement.classList.add('empty'); this.remove();" />${featured}${typeBadge}</div>`
          : `<div class="thumb empty">${featured}${typeBadge}</div>`;

        return `
          <a class="card" href="listing.html?id=${encodeURIComponent(listing.id)}">
            ${thumb}
            <div class="body">
              <div class="title">${title}</div>
              ${price ? `<div class="price">${price}<small>${UyDosh.escapeHtml(UyDosh.t('card.perMonth'))}</small></div>` : ''}
              ${metaParts.length ? `<div class="meta">${metaParts.join('')}</div>` : ''}
            </div>
          </a>
        `;
      }

      function renderAll() {
        gridEl.innerHTML = state.items.map(listingCardHtml).join('');
      }

      function appendListings(list) {
        const frag = document.createElement('div');
        frag.innerHTML = list.map(listingCardHtml).join('');
        while (frag.firstChild) gridEl.appendChild(frag.firstChild);
      }

      function showSkeletons(n = 6) {
        const row = `
          <div class="skeleton">
            <div class="thumb"></div>
            <div class="body">
              <div class="line w80"></div>
              <div class="line w40"></div>
              <div class="line w60"></div>
            </div>
          </div>`;
        statusEl.innerHTML = '';
        statusEl.textContent = '';
        const holder = document.createElement('div');
        holder.className = 'grid';
        holder.style.gridColumn = '1 / -1';
        holder.innerHTML = row.repeat(n);
        statusEl.appendChild(holder);
      }

      function showError() {
        statusEl.innerHTML = `
          <div>${UyDosh.escapeHtml(UyDosh.t('feed.error'))}</div>
          <button class="btn" id="retry" type="button">${UyDosh.escapeHtml(UyDosh.t('feed.retry'))}</button>
        `;
        document.getElementById('retry')?.addEventListener('click', () => {
          state.errored = false;
          loadMore();
        });
      }

      function showEnd() {
        if (state.items.length === 0) {
          statusEl.textContent = UyDosh.t('feed.empty');
        } else {
          statusEl.textContent = UyDosh.t('feed.end');
        }
      }

      function clearStatus() {
        statusEl.innerHTML = '';
      }

      async function loadMore() {
        if (state.loading || state.reachedEnd || state.errored) return;
        if (state.page >= state.totalPages) { state.reachedEnd = true; showEnd(); return; }
        state.loading = true;
        const nextPage = state.page + 1;
        if (nextPage === 1) showSkeletons(8);
        try {
          const data = await UyDosh.fetchListings({ page: nextPage, limit: PAGE_SIZE });
          const listings = Array.isArray(data?.listings) ? data.listings : [];
          state.page = nextPage;
          // We still parse totalPages for robustness, but we only ever load 1 page.
          state.totalPages = 1;
          state.items.push(...listings);
          if (nextPage === 1) gridEl.innerHTML = '';
          appendListings(listings);
          clearStatus();
          state.reachedEnd = true;
          showEnd();
        } catch (err) {
          console.error('Failed to load listings', err);
          state.errored = true;
          if (state.page === 0) gridEl.innerHTML = '';
          showError();
        } finally {
          state.loading = false;
        }
      }

      // No infinite scroll on the landing site (top 10 only).

      UyDosh.initLangSwitcher();
      document.addEventListener('uydosh:langchange', () => {
        renderAll();
        if (state.reachedEnd) showEnd();
      });

      loadMore();
    </script>
  </body>
</html>
