<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UyDosh</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="images/uydosh-logo.svg" type="image/svg+xml" />
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        max-width: 560px;
        width: 100%;
        border: 1px solid rgba(127,127,127,0.25);
        border-radius: 16px;
        padding: 18px 16px;
      }
      a { color: inherit; }
      code { opacity: 0.8; }
    </style>
  </head>
  <body>
    <div class="card">
      <strong>Opening…</strong>
      <div style="margin-top: 10px; opacity: 0.8">
        If nothing happens, go to <a href="index.html">home</a>.
      </div>
      <div style="margin-top: 10px; opacity: 0.7; font-size: 13px">
        <div>Path: <code id="p"></code></div>
      </div>
    </div>

    <script>
      (function () {
        var path = window.location.pathname || "/";
        document.getElementById("p").textContent = path;

        // GitHub Pages can't serve dynamic routes like /listing/14, so we
        // rewrite them to your existing static pages.
        var m = path.match(/^\/listing\/(\d+)(?:\/)?$/);
        if (m) {
          var id = encodeURIComponent(m[1]);
          window.location.replace("/listing.html?id=" + id);
          return;
        }

        // If it's something else, send users to the homepage.
        window.location.replace("/index.html");
      })();
    </script>
  </body>
</html>
